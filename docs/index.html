/* ============================================================
   IDENTIFICATION — pas de mot de passe, juste un nom (localStorage)
   ============================================================ */
const USER_KEY = "newcomer_onboarding_user";
function getUser() { return localStorage.getItem(USER_KEY) || ""; }
function setUser(name) { localStorage.setItem(USER_KEY, name); }
function ensureUser() {
  let u = getUser();
  while (!u || !u.trim()) {
    u = prompt("Bienvenue ! Identifie-toi pour suivre tes actions (ton prénom) :");
    if (u && u.trim()) { setUser(u.trim()); break; }
  }
  return getUser();
}
function changeUser() {
  const cur = getUser();
  const u = prompt("Change d'utilisateur (ton prénom) :", cur);
  if (u && u.trim()) { setUser(u.trim()); renderUserBadge(); render(); }
}
function renderUserBadge() {
  const el = document.getElementById("nav-user");
  if (el) el.innerHTML = `<span class="brand-dot" style="background:var(--green);"></span>${esc(getUser()||"—")}`;
}

/* ============================================================
   STRUCTURE PERSONNALISABLE (globale, partagée) — surcouche de FRAMES/TABS
   DATA.structure = {
     frameOrder: { tabKey: [frameKey,...] },   // ordre + cadres ajoutés/retirés par onglet
     itemOrder:  { frameKey: [itemKey,...] },   // ordre des lignes dans un cadre
     customFrames: { frameKey: {title} },       // cadres créés par l'utilisateur
     customItems:  { frameKey: [{key,label,desc,link}] }, // lignes créées (global)
     roles: [ "Rôle", ... ]                     // rôles proposés à la création (global)
   }
   Les FRAMES/TABS codés en dur restent la base ; la structure ne fait que réordonner/compléter.
   ============================================================ */
const DEFAULT_ROLES = ["Consultant Fonctionnel Comptable"];
const ROLE_COLS = [
  {key:"tl",       label:"TL"},
  {key:"newcomer", label:"Newcomer"},
  {key:"mentor",   label:"Mentor"},

const FORM_PL_FRAMES = new Set((TABS.find(t => t.key === "form_pl") || {}).frames || []);
function frameUsesRoles(frameKey) { return FORM_PL_FRAMES.has(frameKey); }
function getRoles() { return getStructure().roles || DEFAULT_ROLES.slice(); }
function addRole(name) {
  const r = (name || "").trim(); if (!r) return;
  saveStructure(s => { if (!s.roles.includes(r)) s.roles.push(r); });
}
function removeRole(name) {
  saveStructure(s => { s.roles = (s.roles || []).filter(x => x !== name); });
}
function getStructure() {
  if (!DATA.structure) DATA.structure = {};
  const s = DATA.structure;
  if (!s.frameOrder) s.frameOrder = {};
  if (!s.itemOrder) s.itemOrder = {};
  if (!s.customFrames) s.customFrames = {};
  if (!s.customItems) s.customItems = {};
  if (!s.hiddenItems) s.hiddenItems = [];
  if (!s.roles) s.roles = DEFAULT_ROLES.slice();
  return s;
}
function saveStructure(mutator) {
  const d = loadData();
  if (!d.structure) d.structure = {};
  const s = d.structure;
  if (!s.frameOrder) s.frameOrder = {};
  if (!s.itemOrder) s.itemOrder = {};
  if (!s.customFrames) s.customFrames = {};
  if (!s.customItems) s.customItems = {};
  if (!s.hiddenItems) s.hiddenItems = [];
  if (!s.roles) s.roles = DEFAULT_ROLES.slice();
  mutator(s);
  saveData(d);
}
// Définition d'un cadre (codé en dur OU custom)
function frameDef(frameKey) {
  if (FRAMES[frameKey]) return FRAMES[frameKey];
  const cf = getStructure().customFrames[frameKey];
  if (cf) return {title: cf.title, editableDesc:true, items:[], custom:true};
  return null;
}
// Liste ordonnée des cadres d'un onglet (base + ajouts, selon frameOrder)
function tabFrameKeys(tab) {
  if (!tab.frames) return [];
  const s = getStructure();
  const ordered = s.frameOrder[tab.key];
  if (ordered && ordered.length) {
    // garder ceux qui existent encore (base ou custom)
    return ordered.filter(fk => FRAMES[fk] || s.customFrames[fk]);
  }
  return tab.frames.slice();
}
// Liste ordonnée des items d'un cadre (base + customItems, selon itemOrder, moins les masqués)
function frameItems(frameKey) {
  const def = frameDef(frameKey);
  const base = def ? (def.items || []) : [];
  const s = getStructure();
  const hidden = (s.hiddenItems || []);
  const customs = (s.customItems[frameKey] || []).map(c => ({...c, custom:true}));
  const all = base.concat(customs).filter(it => !hidden.includes(it.key));
  const order = s.itemOrder[frameKey];
  if (order && order.length) {
    const byKey = {}; all.forEach(it => byKey[it.key] = it);
    const ordered = order.map(k => byKey[k]).filter(Boolean);
    // ajouter ceux absents de l'ordre (nouveaux) à la fin
    all.forEach(it => { if (!order.includes(it.key)) ordered.push(it); });
    return ordered;
  }
  return all;
}

/* ============================================================
   PERSISTANCE — Firebase (partagé) avec repli localStorage
   - DATA : copie en mémoire, source de vérité pour le rendu synchrone.
   - Si Firebase configuré : push à chaque save + listener temps réel.
   - Sinon : localStorage (données locales au navigateur).
   ============================================================ */
const STORE_KEY = "newcomer_onboarding_v1";
let DATA = {newcomers:[], seq:0};
let fbRef = null;            // référence Realtime Database
let fbReady = false;         // true quand le 1er snapshot est reçu
let applyingRemote = false;  // évite la boucle save->listener->save

function firebaseEnabled() {
  return !!(window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.databaseURL);
}

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {newcomers:[], seq:0}; }
  catch(e) { return {newcomers:[], seq:0}; }
}

// API conservée : loadData() renvoie la copie mémoire, saveData() persiste.
function loadData() { return DATA; }
function saveData(d) {
  DATA = d;
  localStorage.setItem(STORE_KEY, JSON.stringify(d)); // cache local toujours
  if (fbRef && !applyingRemote) {
    fbRef.set(d).catch(e => console.warn("Firebase set échoué :", e.message));
  }
}

// Initialise Firebase si configuré ; renvoie une promesse résolue quand les données sont prêtes.
function initStorage() {
  return new Promise(resolve => {
    if (!firebaseEnabled() || typeof firebase === "undefined") {
      DATA = loadLocal();
      resolve();
      return;
    }
    try {
      firebase.initializeApp(window.FIREBASE_CONFIG);
      fbRef = firebase.database().ref("appData");
      fbRef.on("value", snap => {
        const val = snap.val();
        applyingRemote = true;
        DATA = val && val.newcomers ? val : {newcomers:[], seq:0};
        localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
        applyingRemote = false;
        if (!fbReady) { fbReady = true; resolve(); }
        else { render(); setSyncBadge(true); } // mise à jour distante → re-render
      }, err => {
        console.warn("Firebase indisponible, repli localStorage :", err.message);
        DATA = loadLocal();
        if (!fbReady) { fbReady = true; resolve(); }
      });
    } catch(e) {
      console.warn("Init Firebase échouée, repli localStorage :", e.message);
      DATA = loadLocal();
      resolve();
    }
  });
}

function setSyncBadge(on) {
  const el = document.getElementById("nav-sync");
  if (!el) return;
  if (firebaseEnabled()) {
    el.textContent = "● synchronisé";
    el.style.color = "var(--green)";
    el.title = "Données partagées entre collègues (Firebase)";
  } else {
    el.textContent = "● local";
    el.style.color = "#E0A800";
    el.title = "Données locales à ce navigateur (Firebase non configuré)";
  }
}

function createNewcomer(fields) {
  const d = loadData();
  d.seq += 1;
  const nc = {id: d.seq, ...fields, status:{}, createdAt: new Date().toISOString()};
  d.newcomers.push(nc);
  saveData(d);
  return nc.id;
}
function getNewcomer(id) { return loadData().newcomers.find(n => n.id === id); }
function updateNewcomer(id, patch) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  Object.assign(n, patch);
  saveData(d);
}
function deleteNewcomer(id) {
  const d = loadData();
  d.newcomers = d.newcomers.filter(n => n.id !== id);
  saveData(d);
}
function setArchived(id, archived) {
  updateNewcomer(id, {archived: archived});
}

/* ============================================================
   UTILITAIRES
   ============================================================ */
function slugify(name) {
  return name.normalize("NFKD").replace(/[̀-ͯ]/g, "")
    .trim().toLowerCase().replace(/\s+/g, "-");
}
function chiliLink(name) {
  return `https://pennylane.chilipiper.com/shared/${slugify(name)}/link-60`;
}
function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
// Statut unifié : lit n.status ET n.training (compat anciennes données), écrit dans n.status
function itemDone(n, key) {
  return (n.status||{})[key] === "done" || (n.training||{})[key] === "done";
}
// Statut par colonne de rôle (tl / newcomer / mentor)
function itemRoleDone(n, key, role) {
  return ((n.roleStatus||{})[key]||{})[role] === "done";
}
function setItemRoleStatus(id, key, role, done) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.roleStatus) n.roleStatus = {};
  if (!n.roleStatus[key]) n.roleStatus[key] = {};
  n.roleStatus[key][role] = done ? "done" : "pending";
  if (!n.roleDates) n.roleDates = {};
  if (!n.roleDates[key]) n.roleDates[key] = {};
  if (done) n.roleDates[key][role] = {at: new Date().toISOString(), by: getUser()};
  else delete n.roleDates[key][role];
  saveData(d);
}
function itemRoleStamp(n, key, role) {
  const raw = ((n.roleDates||{})[key]||{})[role];
  if (!raw) return null;
  const dt = new Date(raw.at);
  const j = String(dt.getDate()).padStart(2,"0");
  const m = String(dt.getMonth()+1).padStart(2,"0");
  return {date:`${j}/${m}/${dt.getFullYear()}`, by: raw.by||""};
}
function setItemStatus(id, key, status) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.status) n.status = {};
  n.status[key] = status;
  if (n.training && key in n.training) n.training[key] = status;
  if (!n.dates) n.dates = {};
  if (status === "done") n.dates[key] = {at: new Date().toISOString(), by: getUser()};
  else delete n.dates[key];
  saveData(d);
}
// Note libre par item (ex: "ce qu'on doit montrer") — éditable, partagée
function getItemNote(n, key) { return (n.itemNotes||{})[key] || ""; }
function saveItemNote(id, key, text) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.itemNotes) n.itemNotes = {};
  if (text && text.trim()) n.itemNotes[key] = text.trim();
  else delete n.itemNotes[key];
  saveData(d);
}
// Descriptions de référence (référentiel commun, partagé) — override global de it.desc
function getDesc(item) {
  const ov = (DATA.descOverrides || {})[item.key];
  return ov !== undefined ? ov : (item.desc || "");
}
function saveDesc(key, text) {
  const d = loadData();
  if (!d.descOverrides) d.descOverrides = {};
  d.descOverrides[key] = (text || "").trim();
  saveData(d);
}
// Libellés de référence (référentiel commun, partagé) — override global de it.label
function getLabel(item) {
  const ov = (DATA.labelOverrides || {})[item.key];
  return ov !== undefined && ov !== "" ? ov : (item.label || "");
}
function saveLabel(key, text) {

function livretOf(n) { return n.livret || {niveaux:{}, comments:{}, signatures:{}}; }
function getLivretNiveau(n, itemKey, who) {
  const lv = (n.livret && n.livret.niveaux && n.livret.niveaux[itemKey]) || {};
  return lv[who] || "";
}
function setLivretNiveau(id, itemKey, who, val) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.niveaux) n.livret.niveaux = {};
  if (!n.livret.niveaux[itemKey]) n.livret.niveaux[itemKey] = {};
  const cur = n.livret.niveaux[itemKey][who];
  if (cur === val) { // clic sur le niveau déjà sélectionné = désélection
    n.livret.niveaux[itemKey][who] = "";
    delete n.livret.niveaux[itemKey][who + "By"];
    delete n.livret.niveaux[itemKey][who + "At"];
  } else {
    n.livret.niveaux[itemKey][who] = val;
    n.livret.niveaux[itemKey][who + "By"] = getUser();
    n.livret.niveaux[itemKey][who + "At"] = new Date().toISOString();
  }
  saveData(d);
}
function getLivretStamp(n, itemKey, who) {
  const lv = (n.livret && n.livret.niveaux && n.livret.niveaux[itemKey]) || {};
  const iso = lv[who + "At"]; if (!iso) return "";
  const by = lv[who + "By"] || "";
  const dt = new Date(iso);
  const j = String(dt.getDate()).padStart(2,"0"), m = String(dt.getMonth()+1).padStart(2,"0");
  return `validé${by?" par "+by:""} le ${j}/${m}/${dt.getFullYear()}`;
}
// Commentaire par compétence (item) du livret
function getLivretItemComment(n, itemKey) {
  return (n.livret && n.livret.itemComments && n.livret.itemComments[itemKey]) || "";
}
function saveLivretItemComment(id, itemKey, text) {

  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.itemComments) n.livret.itemComments = {};
  if (text && text.trim()) n.livret.itemComments[itemKey] = text.trim();
  else delete n.livret.itemComments[itemKey];
  saveData(d);
}
function getLivretComment(n, sectionKey, who) {
  const c = (n.livret && n.livret.comments && n.livret.comments[sectionKey]) || {};
  return c[who] || "";
}
function saveLivretComment(id, sectionKey, who, text) {

  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.comments) n.livret.comments = {};
  if (!n.livret.comments[sectionKey]) n.livret.comments[sectionKey] = {};
  n.livret.comments[sectionKey][who] = text;
  saveData(d);
}
// Verrouillage du livret (fige coches/commentaires/signatures)
function isLivretLocked(n) { return !!(n.livret && n.livret.locked); }
function setLivretLocked(id, locked) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (locked) { n.livret.locked = true; n.livret.lockedBy = getUser(); n.livret.lockedAt = new Date().toISOString(); }
  else { n.livret.locked = false; }
  saveData(d);
}
function getLivretSignature(n, who) {
  return (n.livret && n.livret.signatures && n.livret.signatures[who]) || "";
}
function saveLivretSignature(id, who, text) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.signatures) n.livret.signatures = {};
  n.livret.signatures[who] = text;
  saveData(d);
}
// Renvoie {date, by} — compat ancien format (string ISO sans auteur)
function itemStamp(n, key) {
  const raw = (n.dates||{})[key];
  if (!raw) return null;
  const iso = typeof raw === "string" ? raw : raw.at;
  const by = typeof raw === "string" ? "" : (raw.by || "");
  const dt = new Date(iso);
  const j = String(dt.getDate()).padStart(2,"0");
  const m = String(dt.getMonth()+1).padStart(2,"0");
  return {date: `${j}/${m}/${dt.getFullYear()}`, by};
}
// Compteurs par cadre / onglet / global
function countFrame(n, frameKey) {
  const f = frameDef(frameKey); if (!f || f.noCheck) return {done:0,total:0};
  const items = frameItems(frameKey);
  const done = frameUsesRoles(frameKey)
    ? items.filter(it => ROLE_COLS.every(rc => itemRoleDone(n, it.key, rc.key))).length
    : items.filter(it => itemDone(n, it.key)).length;
  return {done, total:items.length};
}
function countTab(n, tab) {
  if (!tab.frames) return {done:0, total:0}; // onglet livret : pas de cadres standard
  return tabFrameKeys(tab).reduce((acc,fk) => {
    const c = countFrame(n, fk); acc.done+=c.done; acc.total+=c.total; return acc;
  }, {done:0,total:0});
}
function countAll(n) {
  const s = getStructure();
  const hidden = s.hiddenItems || [];
  const customKeys = Object.values(s.customItems || {}).flat().map(it => it.key);
  const baseKeys = ALL_ITEMS.map(it => it.key);
  const allKeys = baseKeys.concat(customKeys).filter(k => !hidden.includes(k));
  // Clés relevant de l'onglet Formation Pennylane (comptées via les 3 rôles) ;
  // toutes les autres via la case unique.
  const roleKeys = new Set();
  FORM_PL_FRAMES.forEach(fk => frameItems(fk).forEach(it => roleKeys.add(it.key)));
  return allKeys.filter(k => roleKeys.has(k)
    ? ROLE_COLS.every(rc => itemRoleDone(n, k, rc.key))
    : itemDone(n, k)).length;
}
function totalAll() {
  const s = getStructure();
  const hidden = s.hiddenItems || [];
  const customKeys = Object.values(s.customItems || {}).flat().map(it => it.key);
  const baseKeys = ALL_ITEMS.map(it => it.key);
  return baseKeys.concat(customKeys).filter(k => !hidden.includes(k)).length;
}

// Migration : anciennes lignes custom stockées par newcomer (n.custom) → structure globale
function migrateCustomItems() {
  const d = loadData();
  let changed = false;
  (d.newcomers || []).forEach(n => {
    if (n.custom && Object.keys(n.custom).length) {
      if (!d.structure) d.structure = {};
      const s = d.structure;
      if (!s.customItems) s.customItems = {};
      Object.entries(n.custom).forEach(([fk, items]) => {
        if (!s.customItems[fk]) s.customItems[fk] = [];
        items.forEach(it => {
          if (!s.customItems[fk].some(x => x.key === it.key)) s.customItems[fk].push(it);
        });
      });
      delete n.custom;
      changed = true;
    }
  });
  if (changed) saveData(d);
}

/* ============================================================
   DRAG & DROP — réordonner cadres (dans l'onglet) et lignes (dans un cadre)
   Ordre stocké globalement (partagé). Réordonnancement de lignes = même cadre.
   ============================================================ */
function setupDnD(id, tabKey) {
  const tab = TABS.find(t => t.key === tabKey);
  if (!tab || !tab.frames) return;

  // --- Cadres --- (drag seulement depuis la poignée du cadre)
  const framesWrap = document.querySelector('.dr-frames[data-tab="'+tabKey+'"]');
  if (framesWrap) {
    let dragFrame = null;
    framesWrap.querySelectorAll('.dr-frame').forEach(el => {
      el.setAttribute('draggable', 'false');
      const h = el.querySelector('.frame-drag-handle');
      if (h) {
        h.addEventListener('mousedown', () => el.setAttribute('draggable', 'true'));
        document.addEventListener('mouseup', () => el.setAttribute('draggable', 'false'));
      }
      el.addEventListener('dragstart', e => { dragFrame = el; el.style.opacity = '0.5'; });
      el.addEventListener('dragend', () => { if (dragFrame) dragFrame.style.opacity=''; dragFrame=null; el.setAttribute('draggable','false'); });
      el.addEventListener('dragover', e => {
        if (!dragFrame || dragFrame===el) return;
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height/2;
        if (after) el.after(dragFrame); else el.before(dragFrame);
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        const order = [...framesWrap.querySelectorAll('.dr-frame')].map(x => x.dataset.frameroot);
        saveFrameOrder(tabKey, order);
      });
    });
  }

  // --- Lignes (dans chaque cadre) --- (drag seulement depuis la poignée de ligne)
  document.querySelectorAll('.dr-rows').forEach(rowsWrap => {
    const frameKey = rowsWrap.dataset.frame;
    let dragRow = null;
    rowsWrap.querySelectorAll('.dr-row').forEach(el => {
      el.setAttribute('draggable', 'false');
      const h = el.querySelector('.drag-handle');
      if (h) {
        h.addEventListener('mousedown', () => el.setAttribute('draggable', 'true'));
        document.addEventListener('mouseup', () => el.setAttribute('draggable', 'false'));
      }
      el.addEventListener('dragstart', e => { e.stopPropagation(); dragRow = el; el.style.opacity='0.5'; });
      el.addEventListener('dragend', e => { e.stopPropagation(); if (dragRow) dragRow.style.opacity=''; dragRow=null; el.setAttribute('draggable','false'); });
      el.addEventListener('dragover', e => {
        if (!dragRow || dragRow===el || el.dataset.frame!==frameKey) return;
        e.preventDefault(); e.stopPropagation();
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height/2;
        if (after) el.after(dragRow); else el.before(dragRow);
      });
      el.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        const order = [...rowsWrap.querySelectorAll('.dr-row')].map(x => x.dataset.item);
        saveItemOrder(frameKey, order);
      });
    });
  });
}

function saveFrameOrder(tabKey, order) {
  saveStructure(s => { s.frameOrder[tabKey] = order; });
}
function saveItemOrder(frameKey, order) {
  saveStructure(s => { s.itemOrder[frameKey] = order; });
}

  return parts[2] && TABS.some(t => t.key === parts[2]) ? parts[2] : TABS[0].key;
}
// Repli/dépli des cadres — préférence d'affichage locale (par navigateur)
let COLLAPSED = {};
try { COLLAPSED = JSON.parse(localStorage.getItem("frame_collapsed")) || {}; } catch(e) { COLLAPSED = {}; }
function isCollapsed(frameKey) { return !!COLLAPSED[frameKey]; }
function toggleCollapse(frameKey) {
  COLLAPSED[frameKey] = !COLLAPSED[frameKey];
  localStorage.setItem("frame_collapsed", JSON.stringify(COLLAPSED));
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
}
function toggleItem(id, key) {
  const n = getNewcomer(id);
  setItemStatus(id, key, itemDone(n, key) ? "pending" : "done");
  renderDetail(id, curTabKey());
}
function toggleRoleItem(id, key, role) {
  const n = getNewcomer(id);
  setItemRoleStatus(id, key, role, !itemRoleDone(n, key, role));
  renderDetail(id, curTabKey());
}
// Sauve la note sans re-render (préserve le focus pendant la frappe)
function saveItemNoteFromUI(id, key, text) {
  saveItemNote(id, key, text);
}
// Édition d'une description de référence (référentiel partagé)
function editDescUI(key) {
  document.getElementById("desc-view-" + key).style.display = "none";
  document.getElementById("desc-edit-" + key).style.display = "block";
  const ta = document.getElementById("desc-ta-" + key);
  ta.focus();
}
function cancelDescUI(key) {
  document.getElementById("desc-edit-" + key).style.display = "none";
  document.getElementById("desc-view-" + key).style.display = "block";
}
function saveDescUI(key) {
  const text = document.getElementById("desc-ta-" + key).value;
  saveDesc(key, text);
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
  toast("Description mise à jour");
}
function editLabelUI(key) {
  document.getElementById("label-view-" + key).style.display = "none";
  document.getElementById("label-edit-" + key).style.display = "block";
  document.getElementById("label-ta-" + key).focus();
}
function cancelLabelUI(key) {
  document.getElementById("label-edit-" + key).style.display = "none";
  document.getElementById("label-view-" + key).style.display = "block";
}
function saveLabelUI(key) {
  const text = document.getElementById("label-ta-" + key).value;
  if (!text.trim()) { toast("L'intitulé ne peut pas être vide"); return; }
  saveLabel(key, text);
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
  toast("Intitulé mis à jour");
}
// Lignes custom — GLOBALES (référentiel partagé) via DATA.structure.customItems
function addCustomItem(frameKey) {
  const label = prompt("Intitulé de la nouvelle ligne :");
  if (!label || !label.trim()) return;
  const key = "c_" + frameKey + "_" + Date.now();
  saveStructure(s => {
    if (!s.customItems[frameKey]) s.customItems[frameKey] = [];
    s.customItems[frameKey].push({key, label: label.trim()});
  });
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
}
// Supprime une ligne : custom = suppression réelle ; base = masquage (réversible en interne)
function deleteLine(frameKey, key, isCustom) {
  if (!confirm("Supprimer cette ligne ?")) return;
  saveStructure(s => {
    if (isCustom) {
      if (s.customItems[frameKey]) s.customItems[frameKey] = s.customItems[frameKey].filter(it => it.key !== key);
    } else {
      if (!s.hiddenItems.includes(key)) s.hiddenItems.push(key);
    }
    if (s.itemOrder[frameKey]) s.itemOrder[frameKey] = s.itemOrder[frameKey].filter(k => k !== key);
  });
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
}
// Cadres custom — GLOBAUX
function addCustomFrame(tabKey) {
  const title = prompt("Nom du nouveau cadre :");
  if (!title || !title.trim()) return;
  const frameKey = "cf_" + tabKey + "_" + Date.now();
  saveStructure(s => {
    s.customFrames[frameKey] = {title: title.trim()};
    const tab = TABS.find(t => t.key === tabKey);
    const base = (s.frameOrder[tabKey] && s.frameOrder[tabKey].length) ? s.frameOrder[tabKey] : (tab.frames ? tab.frames.slice() : []);
    s.frameOrder[tabKey] = base.concat([frameKey]);
  });
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
}
function deleteCustomFrame(tabKey, frameKey) {
  if (!confirm("Supprimer ce cadre et ses lignes ?")) return;
  saveStructure(s => {
    delete s.customFrames[frameKey];
    delete s.customItems[frameKey];
    delete s.itemOrder[frameKey];
    if (s.frameOrder[tabKey]) s.frameOrder[tabKey] = s.frameOrder[tabKey].filter(k => k !== frameKey);
  });
  renderDetail(parseInt(location.hash.match(/newcomer\/(\d+)/)[1]), curTabKey());
}
function saveNotes(id) {
  updateNewcomer(id, {notes: document.getElementById("notes-area").value});
  toast("Notes sauvegardées");
}
function confirmDelete(id) {
  if (confirm("Supprimer définitivement ce newcomer ?")) { deleteNewcomer(id); go(""); }
}

/* ============================================================
   MODALES copier-coller
   ============================================================ */
const SLACK_LINKS = {
  channel: "https://pennylane-org.slack.com/archives/C0AQ8GY9J58",
  vincent: "https://pennylane-org.slack.com/team/U06CDV632UF",
  braga: "https://pennylane-org.slack.com/archives/C0AJ0K768BV",
};
const JIRA_PORTAL = "https://pennylane.atlassian.net/servicedesk/customer/portal/1";

function blockCopy(labelTxt, content, multiline) {
  const id = "cp_" + Math.random().toString(36).slice(2);
  const tag = multiline ? `<pre id="${id}" style="flex:1;">${esc(content)}</pre>` : `<code id="${id}" style="flex:1;">${esc(content)}</code>`;
  return `<div style="margin-bottom:16px;">
    <div style="font-size:0.78rem; font-weight:700; text-transform:uppercase; color:var(--text-muted); letter-spacing:.5px; margin-bottom:6px;">${labelTxt}</div>
    <div style="display:flex; gap:8px; align-items:${multiline?'flex-start':'center'};">
      ${tag}<button class="btn btn-sm btn-outline" style="white-space:nowrap;" onclick="copyEl('${id}', this)">Copier</button>
    </div></div>`;
}

function openAction(action, id) {
  const n = getNewcomer(id);
  const roleStr = n.role ? ` (${n.role})` : "";
  let title = "", body = "", link = "", linkLabel = "Ouvrir";

  if (action === "slack") {
    title = "Accès Slack à créer manuellement";
    body = `<p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:16px;">Ajoute <strong style="color:var(--teal-dark);">${esc(n.email)}</strong> dans :</p>
      <ul style="font-size:0.875rem; line-height:1.9; margin:0 0 16px 18px; color:var(--teal-dark);">
        <li>Canal <strong>#pro-services-2</strong></li>
        <li>Groupe d'utilisateurs <strong>@cs.services</strong></li>
        <li>Groupe d'utilisateurs <strong>@ob</strong></li>
      </ul>`;
    link = SLACK_LINKS.channel; linkLabel = "Ouvrir #pro-services-2 dans Slack";
  }
  else if (action === "jira_connect") {
    title = "Ticket Jira — Pennylane Connect";
    body = blockCopy("Titre", `Accès Pennylane Connect étendu — ${n.name}`)
      + blockCopy("Description", `Bonjour,\n\nPouvez-vous créer un accès Pennylane Connect avec droits étendus aux clients pour le/la nouvel(le) IC suivant(e) :\n\nNom : ${n.name}\n\nMerci !`, true);
    link = JIRA_PORTAL; linkLabel = "Ouvrir le portail Jira";
  }
  else if (action === "jira_chift") {
    title = "Ticket Jira — Chift";
    body = blockCopy("Titre", `Accès Chift — ${n.name}`)
      + blockCopy("Description", `Bonjour,\n\nPouvez-vous créer un accès Chift pour le/la nouvel(le) IC suivant(e) :\n\nNom : ${n.name}\n\nMerci !`, true);
    link = JIRA_PORTAL; linkLabel = "Ouvrir le portail Jira";
  }
  else if (action === "swan") {
    title = "DM Slack à Vincent — Dash SWAN";
    body = blockCopy("Message", `Bonjour Vincent,\n\nPourrais-tu créer un accès au Dash SWAN pour ${n.name}${roleStr} qui vient de rejoindre l'équipe Professional Services ?\n\nMerci !`, true);
    link = SLACK_LINKS.vincent; linkLabel = "Ouvrir le DM de Vincent dans Slack";
  }
  else if (action === "braga") {
    title = "Message canal #relances-rdv-webi-braga";
    body = blockCopy("Message", `Bonjour,\n\nVoici le lien Chilipiper de ${n.name}${roleStr}, nouvel(le) IC qui vient de rejoindre l'équipe Onboarding Banker.\n\nMerci de l'ajouter à vos tâches de relances :\n${chiliLink(n.name)}`, true);
    link = SLACK_LINKS.braga; linkLabel = "Ouvrir #relances-rdv-webi-braga dans Slack";
  }

  body += `<a href="${link}" target="_blank" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;" onclick="markDoneFromModal('${id}','${getActionTaskKey(action)}')">${linkLabel}</a>`;
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = body;
  document.getElementById("modal").classList.add("open");
}

function getActionTaskKey(action) {
  const map = {slack:"slack_access", jira_connect:"pennylane_connect_jira", jira_chift:"chift_jira", swan:"dash_swan", braga:"braga_chili"};
  return map[action] || "";
}
function markDoneFromModal(id, key) {
  if (key) setItemStatus(parseInt(id), key, "done");
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
  const hash = location.hash.replace(/^#\//, "").split("/");
  if (hash[0] === "newcomer") renderDetail(parseInt(hash[1]), curTabKey());
}
document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });

function copyEl(elId, btn) {
  const txt = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const o = btn.textContent; btn.textContent = "Copié !"; btn.style.background = "var(--green-dark)"; btn.style.color = "white";
    setTimeout(() => { btn.textContent = o; btn.style.background = ""; btn.style.color = ""; }, 1500);
  });
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
</script>
