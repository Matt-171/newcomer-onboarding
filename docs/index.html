/* ============================================================
   IDENTIFICATION — pas de mot de passe, juste un nom (localStorage)
   ============================================================ */
const USER_KEY = "newcomer_onboarding_user";
function getUser() { return localStorage.getItem(USER_KEY) || ""; }
function setUser(name) { localStorage.setItem(USER_KEY, name); }
function ensureUser() {
  let u = getUser();
  while (!u || !u.trim()) {
    u = prompt("Bienvenue ! Identifie-toi pour suivre tes actions (ton prénom) :");
    if (u && u.trim()) { setUser(u.trim()); break; }
  }
  return getUser();
}
function changeUser() {
  const cur = getUser();
  const u = prompt("Change d'utilisateur (ton prénom) :", cur);
  if (u && u.trim()) { setUser(u.trim()); renderUserBadge(); render(); }
}
function renderUserBadge() {
  const el = document.getElementById("nav-user");
  if (!el) return;
  el.innerHTML = `<span class="brand-dot" style="background:var(--green);"></span>${esc(getUser()||"—")}`;
  if (fbAuthActive && authUser) {
    // identité fournie par Google → clic = déconnexion
    el.onclick = signOutUser;
    el.title = "Se déconnecter";
  } else {
    el.onclick = changeUser;
    el.title = "Changer d'utilisateur";
  }
  // "+ Nouveau newcomer" et "Gestion des droits" — selon permissions
  const navNew = document.getElementById("nav-new");
  if (navNew) navNew.style.display = hasPerm("create_newcomer") ? "" : "none";
  const navDroits = document.getElementById("nav-droits");
  if (navDroits) navDroits.style.display = hasPerm("manage_rights") ? "" : "none";
}

  // --- OB blanc : cadre Script de présentation & posture (en tête) ---
  ob_blanc_script: { title:"Script de présentation & posture", editableDesc:true, noCheck:true, items:[
    {key:"obs_script", label:"Script de présentation", desc:"• Enregistrer la réunion / proposer le replay\n• Se présenter : interlocuteur principal durant l'accompagnement\n• Réunion de cadrage suivie d'une période d'adoption (1 à 1,5 mois)\n• Dispo par chat sur la plateforme ou par mail (aide et support / envoyer un message / service onboarding)\n• Points de suivi + point de validation qui clôture l'accompagnement\n• Équipe dédiée qui prend le relais ensuite\n• Ce qu'on va faire aujourd'hui (slide validation des paramétrages)"},
    {key:"obg_tour_table", label:"Tour de table", desc:"• Présentation du client, rôles, profil comptable ou non ?\n• Questions sur leur organisation : qui fait la TVA (cabinet ou eux) ? facturation sur PL ou importée ?\n• Qui utilisera l'outil au quotidien (rôle, maturité digitale) ? combien d'utilisateurs actifs ?\n• Des utilisateurs employés avec accès limités à créer (NDF, consultation) ?\n• Secteur d'activité et nature des flux (B2B, B2C, e-commerce, restauration…)"},
    {key:"obs_posture", label:"Posture formateur", desc:"• Aisance\n• Suivre la méthode\n• Capacité à recadrer un client\n• Capacité à s'adapter au besoin du client"},
    {key:"obg_fin_rdv", label:"Fin du RDV : récap et prise de RDV"},
  ]},

  // --- OB blanc : attendus (contenu à compléter) ---
  ob_blanc_gestion: { title:"OB blanc — Gestion : attendus", editableDesc:true, items:[
    {key:"obg_replay", label:"Enregistrer la réunion / proposer le replay"},
    {key:"obg_presentation", label:"Présentation OB", desc:"• Déroulé du point\n• Interlocuteur principal durant l'accompagnement\n• Période d'adoption et durée / points de suivi et point de validation\n• Dispo par chat sur la plateforme ou par mail\n• Équipe support dédiée par la suite / réponse en 5 min"},
    // Prérequis à qualifier (base checklist post-cadrage) — dimensions absentes des attendus ci-dessus
    {key:"obg_pre_usage", label:"Prérequis — Usage général de l'outil", desc:"• Facturation sur Pennylane ou autre logiciel ?\n• Achats / dépenses fournisseurs sur Pennylane ?\n• Suivi de trésorerie ?\n• Module de pilotage / analytique ?\n• Notes de frais ?\n• Facturation électronique (PDP) ?\n• Compte Pro Pennylane ?"},
    {key:"obg_pre_reprise", label:"Prérequis — Reprise de la donnée", desc:"• Factures clients ouvertes à reprendre ?\n• Catalogue produits / services à importer ?\n• Liste clients et fournisseurs disponible ?\n• Devis en cours à basculer ?"},
    {key:"obg_pre_integrations", label:"Prérequis — Intégrations", desc:"• Outils métier à connecter (caisse, e-commerce, paie, facturation externe…) ?\n• Ces intégrations sont-elles disponibles sur Pennylane ?\n• Qui gère la configuration côté client ?"},
    {key:"obg_pre_pilotage", label:"Prérequis — Besoins en pilotage", desc:"• Suivi de trésorerie ?\n• Besoins en analytique (axes, centres de coût) ?\n• Prévisionnel à configurer ?"},
    {key:"obg_pre_planning", label:"Prérequis — Planning opérationnel", desc:"• Date de démarrage cible ?\n• Format d'onboarding retenu (durée, distanciel/présentiel) ?\n• Premiers cas d'usage à couvrir en priorité ?\n• KPIs d'activation clairs (1ère facture, banque connectée, 1er règlement fournisseur) ?"},

/* ============================================================
   STRUCTURE PERSONNALISABLE (globale, partagée) — surcouche de FRAMES/TABS
   DATA.structure = {
     frameOrder: { tabKey: [frameKey,...] },   // ordre + cadres ajoutés/retirés par onglet
     itemOrder:  { frameKey: [itemKey,...] },   // ordre des lignes dans un cadre
     customFrames: { frameKey: {title} },       // cadres créés par l'utilisateur
     customItems:  { frameKey: [{key,label,desc,link}] }, // lignes créées (global)
     roles: [ "Rôle", ... ]                     // rôles proposés à la création (global)
   }
   Les FRAMES/TABS codés en dur restent la base ; la structure ne fait que réordonner/compléter.
   ============================================================ */
const DEFAULT_ROLES = ["Consultant Fonctionnel Comptable"];
const ROLE_COLS = [
  {key:"tl",       label:"TL"},
  {key:"newcomer", label:"Newcomer"},
  {key:"mentor",   label:"Mentor"},
];
// Jeu de colonnes "checklist de contrôle" (OB blanc) : TL + Newcomer, une coche = point annoncé/fait.
const CHECKLIST_COLS = [
  {key:"tl",       label:"TL"},
  {key:"newcomer", label:"Newcomer"},
];
// Les 3 colonnes TL / Newcomer / Mentor s'affichent sur les cadres "Formation Pennylane" (listés ici,
// indépendamment de l'onglet qui les héberge — ils sont désormais fusionnés dans l'onglet OB blanc).
// Un cadre peut aussi déclarer ses propres colonnes via f.cols (ex. checklist de contrôle).
// Partout ailleurs : case à cocher unique.
const FORM_PL_FRAMES = new Set(["pl_gestion","pl_compta","pl_autres"]);
// Colonnes d'un cadre : Formation Pennylane → 3 rôles ; sinon f.cols si défini ; sinon aucune (case unique).
function frameColsFor(frameKey) {
  if (FORM_PL_FRAMES.has(frameKey)) return ROLE_COLS;
  const f = frameDef(frameKey);
  if (f && f.checklist) return CHECKLIST_COLS;       // checklist de contrôle : TL + Newcomer
  return (f && Array.isArray(f.cols)) ? f.cols : null;
}
function frameUsesRoles(frameKey) { return !!frameColsFor(frameKey); }
function getRoles() { return getStructure().roles || DEFAULT_ROLES.slice(); }
function addRole(name) {
  const r = (name || "").trim(); if (!r) return;
  saveStructure(s => { if (!s.roles.includes(r)) s.roles.push(r); });
}
function removeRole(name) {
  saveStructure(s => { s.roles = (s.roles || []).filter(x => x !== name); });
}

/* ============================================================
   DROITS D'ACCÈS — rôles TL / MENTOR / NEWCOMER (par email @pennylane.com)
   Défaut = NEWCOMER. TL et MENTOR = listes ci-dessous, + overrides globaux (modifiables).
   Les onglets "Démarrage" et "Accès outils" sont réservés au rôle TL.
   ============================================================ */
const ACCESS_DEFAULTS = {
  admin: ["matthieu.tabareau"], // Admin = tous droits TL + prévisualisation (impersonation)
  tl: ["jonathan.knaus", "jezabel.legrand", "valentin.guilbert", "antonio.pereira"],
  mentor: ["tiphanie.sauret", "marie.chamiot-maitral", "alice.perocheau", "etienne.barthelemy", "camelia.herbil", "peggy.marger", "thomas.nouet", "benoit.chalas"],
};
const TL_ONLY_TABS = new Set(["demarrage", "acces"]); // onglets réservés aux TL (et Admin)
function emailLocalPart(email) { return (email || "").toLowerCase().split("@")[0]; }
// Rôle d'un email : override global prioritaire, sinon listes par défaut, sinon newcomer
function roleForEmail(email) {
  const lp = emailLocalPart(email);
  if (!lp) return "newcomer";
  const ov = (getStructure().accessRoles || {})[lp];
  if (ov) return ov;
  if ((ACCESS_DEFAULTS.admin || []).includes(lp)) return "admin";
  if (ACCESS_DEFAULTS.tl.includes(lp)) return "tl";
  if (ACCESS_DEFAULTS.mentor.includes(lp)) return "mentor";
  return "newcomer";
}
// Impersonation (prévisualisation par le vrai TL) — LOCAL, non partagé
let impersonateEmail = null;
try { impersonateEmail = sessionStorage.getItem("impersonate") || null; } catch(e) { impersonateEmail = null; }
// Le vrai email de session (jamais impersoné) — sert à autoriser l'impersonation
function realEmail() {
  if (!fbAuthActive || !authUser) return null; // mode local dev
  return authUser.email;
}
// Le vrai rôle de session (jamais impersoné)
function realRole() {
  const e = realEmail();
  if (!e) return "admin"; // mode local dev = admin (tous droits)
  return roleForEmail(e);
}
function realIsAdmin() { return realRole() === "admin"; }
// Email "effectif" : celui qu'on simule si impersonation active (réservé à l'admin), sinon le vrai
function effectiveEmail() {
  if (impersonateEmail && realIsAdmin()) return impersonateEmail;
  return realEmail();
}
function setImpersonate(email) {
  if (!realIsAdmin()) return; // seul l'Admin peut prévisualiser
  impersonateEmail = email || null;
  try { email ? sessionStorage.setItem("impersonate", email) : sessionStorage.removeItem("impersonate"); } catch(e) {}
}
function currentRole() {
  const e = effectiveEmail();
  if (!e) return "admin"; // mode local (dev) = accès complet
  return roleForEmail(e);
}
// Admin a tous les droits TL. isTL() = TL ou Admin (sauf en impersonation d'un rôle inférieur).
function isAdmin() { return currentRole() === "admin"; }
function isTL() { return currentRole() === "tl" || currentRole() === "admin"; }
function isMentor() { return currentRole() === "mentor"; }
// Garde : bloque une action réservée aux TL/Admin (renvoie true si autorisé)
function requireTL() {
  if (isTL()) return true;
  toast("Action réservée aux TL");
  return false;
}
// Garde générique par permission (renvoie true si autorisé)
function requirePerm(permKey) {
  if (hasPerm(permKey)) return true;

const PERM_BY_KEY = {}; PERMISSIONS.forEach(p => PERM_BY_KEY[p.key] = p);
// Un rôle a-t-il une permission ? override structure.perms sinon défaut.
function roleHasPerm(role, permKey) {
  const p = PERM_BY_KEY[permKey]; if (!p) return false;
  const ov = ((getStructure().perms || {})[permKey] || {});
  if (role in ov) return !!ov[role];
  return !!p.def[role];
}
// Permission du rôle courant (effectif)
function hasPerm(permKey) { return roleHasPerm(currentRole(), permKey); }
function setPerm(permKey, role, val) {
  saveStructure(s => {
    if (!s.perms) s.perms = {};
    if (!s.perms[permKey]) s.perms[permKey] = {};
    s.perms[permKey][role] = !!val;
  });
}
// Journal des connexions : { localPart: {name, email, last} }
function recordLogin() {
  if (!fbAuthActive || !authUser) return;
  const lp = emailLocalPart(authUser.email);
  if (!lp) return;
  const entry = {
    name: authUser.displayName || lp,
    email: authUser.email,
    last: new Date().toISOString(),
  };
  // Mémoire locale immédiate (affichage), clé en clair (avec point)
  const d = loadData();
  if (!d.structure) d.structure = {};
  if (!d.structure.logins) d.structure.logins = {};
  d.structure.logins[lp] = entry;
  localStorage.setItem(STORE_KEY, JSON.stringify(d));
  // Écriture Firebase CIBLÉE : les clés RTDB interdisent le point → on encode (tiphanie.sauret → tiphanie,sauret).
  // Écriture atomique par child (ne réécrit pas tout le document, évite d'écraser une connexion concurrente).
  if (fbRef) {
    fbRef.child("structure/logins/" + encodeKey(lp)).set(entry)
      .catch(e => console.warn("recordLogin échoué :", e.message));
  } else {
    saveData(d); // mode local : pas de Firebase
  }
}
// --- Clés Firebase : le point (et . $ # [ ] /) est interdit dans une clé RTDB.
// Les maps indexées par local-part d'email (logins, accessRoles) contiennent des points → on encode le point en virgule.
function encodeKey(k) { return String(k).replace(/\./g, ","); }
function decodeKey(k) { return String(k).replace(/,/g, "."); }
function encodeKeyedMap(m) { const o = {}; if (m) Object.keys(m).forEach(k => o[encodeKey(k)] = m[k]); return o; }
function decodeKeyedMap(m) { const o = {}; if (m) Object.keys(m).forEach(k => o[decodeKey(k)] = m[k]); return o; }
function getStructure() {
  if (!DATA.structure) DATA.structure = {};
  const s = DATA.structure;
  if (!s.frameOrder) s.frameOrder = {};
  if (!s.itemOrder) s.itemOrder = {};
  if (!s.customFrames) s.customFrames = {};
  if (!s.customItems) s.customItems = {};
  if (!s.hiddenItems) s.hiddenItems = [];
  if (!s.roles) s.roles = DEFAULT_ROLES.slice();
  return s;
}
function saveStructure(mutator) {
  const d = loadData();
  if (!d.structure) d.structure = {};
  const s = d.structure;
  if (!s.frameOrder) s.frameOrder = {};
  if (!s.itemOrder) s.itemOrder = {};
  if (!s.customFrames) s.customFrames = {};
  if (!s.customItems) s.customItems = {};
  if (!s.hiddenItems) s.hiddenItems = [];
  if (!s.roles) s.roles = DEFAULT_ROLES.slice();
  mutator(s);
  saveData(d);
}
// Définition d'un cadre (codé en dur OU custom)
function frameDef(frameKey) {
  if (FRAMES[frameKey]) return FRAMES[frameKey];
  const cf = getStructure().customFrames[frameKey];
  if (cf) return {title: cf.title, editableDesc:true, items:[], custom:true};
  return null;
}
// Liste ordonnée des cadres d'un onglet (base + ajouts, selon frameOrder)
function tabFrameKeys(tab) {
  if (!tab.frames) return [];
  const s = getStructure();
  const ordered = s.frameOrder[tab.key];
  if (ordered && ordered.length) {
    // garder ceux qui existent encore (base ou custom)
    const kept = ordered.filter(fk => FRAMES[fk] || s.customFrames[fk]);
    // Ajouter les cadres de base ajoutés au code APRÈS la sauvegarde de l'ordre (sinon invisibles).
    const missing = (tab.frames || []).filter(fk => !kept.includes(fk));
    return kept.concat(missing);
  }
  return tab.frames.slice();
}
// Liste ordonnée des items d'un cadre (base + customItems, selon itemOrder, moins les masqués)
function frameItems(frameKey) {
  const def = frameDef(frameKey);
  const base = def ? (def.items || []) : [];
  const s = getStructure();
  const hidden = (s.hiddenItems || []);
  const customs = (s.customItems[frameKey] || []).map(c => ({...c, custom:true}));
  const all = base.concat(customs).filter(it => !hidden.includes(it.key));
  const order = s.itemOrder[frameKey];
  if (order && order.length) {
    const byKey = {}; all.forEach(it => byKey[it.key] = it);
    const ordered = order.map(k => byKey[k]).filter(Boolean);
    // ajouter ceux absents de l'ordre (nouveaux) à la fin
    all.forEach(it => { if (!order.includes(it.key)) ordered.push(it); });
    return ordered;
  }
  return all;
}

/* ============================================================
   PERSISTANCE — Firebase (partagé) avec repli localStorage
   - DATA : copie en mémoire, source de vérité pour le rendu synchrone.
   - Si Firebase configuré : push à chaque save + listener temps réel.
   - Sinon : localStorage (données locales au navigateur).
   ============================================================ */
const STORE_KEY = "newcomer_onboarding_v1";
let DATA = {newcomers:[], seq:0};
let fbRef = null;            // référence Realtime Database
let fbReady = false;         // true quand le 1er snapshot est reçu
let applyingRemote = false;  // évite la boucle save->listener->save

function firebaseEnabled() {
  return !!(window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.databaseURL);
}

function loadLocal() {
  try { return normalizeData(JSON.parse(localStorage.getItem(STORE_KEY))); }
  catch(e) { return {newcomers:[], seq:0}; }
}

// Normalise l'état : Firebase peut renvoyer 'newcomers' en tableau avec trous (null) ou en objet indexé.
// On garantit un vrai tableau sans null, et un seq cohérent.
function normalizeData(val) {
  if (!val || typeof val !== "object") return {newcomers:[], seq:0};
  // Source prioritaire : newcomersById (nouveau format objet) ; sinon newcomers (ancien format)
  let ncs;
  if (val.newcomersById && typeof val.newcomersById === "object") {
    ncs = Object.values(val.newcomersById).filter(Boolean);
  } else {
    ncs = val.newcomers;
    if (Array.isArray(ncs)) ncs = ncs.filter(Boolean);        // retire les trous (null)
    else if (ncs && typeof ncs === "object") ncs = Object.values(ncs).filter(Boolean); // objet indexé → tableau
    else ncs = [];
  }
  ncs.sort((a,b) => (a.id||0) - (b.id||0));
  const maxId = ncs.reduce((m, n) => Math.max(m, n && n.id ? n.id : 0), 0);
  const seq = Math.max(val.seq || 0, maxId);
  const out = {...val, newcomers: ncs, seq};
  delete out.newcomersById; // en mémoire on ne garde que le tableau
  // Décodage des clés encodées pour Firebase (virgule → point) sur les maps par local-part.
  if (out.structure) {
    const st = {...out.structure};
    if (st.logins) st.logins = decodeKeyedMap(st.logins);
    if (st.accessRoles) st.accessRoles = decodeKeyedMap(st.accessRoles);
    out.structure = st;
  }
  return out;
}

// API conservée : loadData() renvoie la copie mémoire, saveData() persiste.
function loadData() { return DATA; }
let pendingLocalEcho = false;     // true entre notre écriture et la réception de son écho Firebase
let pendingRemoteRender = false;  // un changement distant est arrivé pendant qu'une modale était ouverte
function saveData(d) {
  DATA = d;
  localStorage.setItem(STORE_KEY, JSON.stringify(d)); // cache local toujours
  if (fbRef && !applyingRemote) {
    // On pousse 'newcomers' comme OBJET indexé par id (évite les tableaux à trous Firebase quand les id ne partent pas de 0)
    const payload = {...d, newcomers: undefined, newcomersById: {}};
    delete payload.newcomers;
    (d.newcomers || []).forEach(n => { if (n && n.id != null) payload.newcomersById[n.id] = n; });
    // Les clés RTDB interdisent le point → on encode les maps indexées par local-part (logins, accessRoles).
    if (payload.structure) {
      const st = {...payload.structure};
      if (st.logins) st.logins = encodeKeyedMap(st.logins);
      if (st.accessRoles) st.accessRoles = encodeKeyedMap(st.accessRoles);
      payload.structure = st;
    }
    pendingLocalEcho = true;
    fbRef.set(payload)
      .then(() => { pendingLocalEcho = false; })
      .catch(e => { pendingLocalEcho = false; console.warn("Firebase set échoué :", e.message); });
  }
}

const ALLOWED_DOMAIN = "@pennylane.com";
let authUser = null;      // utilisateur Firebase connecté (ou null)
let dbStarted = false;    // listener DB déjà branché
let fbAuthActive = false; // true seulement si Firebase + Auth réellement dispo

// Initialise Firebase + authentification. Résout quand l'état d'auth est connu.
function initStorage() {
  return new Promise(resolve => {
    if (!firebaseEnabled() || typeof firebase === "undefined" || !firebase.auth) {
      DATA = loadLocal();   // SDK indisponible → repli local, pas d'auth exigée
      resolve();
      return;
    }
    try {
      firebase.initializeApp(window.FIREBASE_CONFIG);
      fbAuthActive = true;
      firebase.auth().onAuthStateChanged(user => {
        if (user && user.email && user.email.toLowerCase().endsWith(ALLOWED_DOMAIN)) {
          authUser = user;
          setUser(user.displayName || user.email.split("@")[0]);
          renderAuthGate();
          // Affichage instantané depuis le cache local, puis rafraîchissement DB en arrière-plan
          DATA = loadLocal();
          if (!fbReady) { fbReady = true; resolve(); }
          startDbListener(); // le listener re-render quand les données fraîches arrivent
        } else {
          if (user) { firebase.auth().signOut(); authUser = null; } // domaine non autorisé
          else authUser = null;
          renderAuthGate();
          if (!fbReady) { fbReady = true; resolve(); } // pas connecté : résoudre pour afficher le login
        }
      });
    } catch(e) {
      console.warn("Init Firebase échouée, repli localStorage :", e.message);
      fbAuthActive = false;
      DATA = loadLocal();
      resolve();
    }
    // Filet de sécurité : si l'auth ne répond pas en 8s, on ne bloque pas indéfiniment
    setTimeout(() => { if (!fbReady) { fbReady = true; resolve(); } }, 8000);
  });
}

// Branche le listener temps réel (uniquement une fois connecté)
// onFirstSnap : callback appelé au premier snapshot reçu (données prêtes)
function startDbListener(onFirstSnap) {
  if (dbStarted) { if (onFirstSnap) onFirstSnap(); return; }
  dbStarted = true;
  fbRef = firebase.database().ref("appData");
  let firstSnap = true;
  fbRef.on("value", snap => {
    const val = snap.val();
    if (firstSnap) {
      firstSnap = false;
      applyingRemote = true;
      DATA = normalizeData(val);
      localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
      applyingRemote = false;
      recordLogin();
      if (onFirstSnap) onFirstSnap();
      render(); setSyncBadge(true);
      return;
    }
    setSyncBadge(true);
    // Si une écriture locale est en attente d'écho, on ignore les snapshots jusqu'à réception
    // du nôtre (évite qu'un snapshot en retard écrase notre modif). L'echo de notre écriture
    // porte le même contenu que DATA courant → on ne fait rien.
    const incomingNorm = JSON.stringify(normalizeData(val));
    if (incomingNorm === JSON.stringify(DATA)) { pendingLocalEcho = false; return; } // identique → rien à faire
    if (pendingLocalEcho) return; // snapshot en retard pendant qu'on attend notre écho → ignorer
    // Vrai changement distant : appliquer
    applyingRemote = true;
    DATA = normalizeData(val);
    localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
    applyingRemote = false;
    const modalOpen = document.getElementById("modal").classList.contains("open");
    if (modalOpen) { pendingRemoteRender = true; return; }
    render();
  }, err => {
    console.warn("Firebase DB inaccessible :", err.message);
    if (onFirstSnap) onFirstSnap(); // ne pas bloquer si la DB échoue
  });
}

function isAuthed() {
  return !fbAuthActive || !!authUser; // auth requise seulement si Firebase Auth actif
}
function signInGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: "pennylane.com", prompt: "select_account" });
  firebase.auth().signInWithPopup(provider).catch(e => {
    alert("Connexion échouée : " + e.message);
  });
}
function signOutUser() {
  if (firebase && firebase.auth) firebase.auth().signOut().then(() => location.reload());
}

// Écran de connexion / garde d'accès
function renderAuthGate() {
  if (isAuthed()) { document.getElementById("auth-gate").style.display = "none"; return; }
  const gate = document.getElementById("auth-gate");
  gate.style.display = "flex";
  gate.innerHTML = `
    <div style="background:#fff; border-radius:var(--radius); border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,61,61,.12); padding:40px; max-width:400px; text-align:center;">
      <div style="width:48px; height:48px; background:var(--teal-light); border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; font-size:1.4rem;">🔒</div>
      <h1 style="font-size:1.3rem; font-weight:800; color:var(--teal-dark); margin-bottom:8px;">Onboarding Newcomers</h1>
      <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:24px;">Accès réservé aux collaborateurs Pennylane. Connecte-toi avec ton compte <strong>@pennylane.com</strong>.</p>
      <button class="btn btn-accent" style="width:100%; justify-content:center;" onclick="signInGoogle()">Se connecter avec Google</button>
    </div>`;
}

function setSyncBadge(on) {
  const el = document.getElementById("nav-sync");
  if (!el) return;
  if (firebaseEnabled()) {
    el.textContent = "● synchronisé";
    el.style.color = "var(--green)";
    el.title = "Données partagées entre collègues (Firebase)";
  } else {
    el.textContent = "● local";
    el.style.color = "#E0A800";
    el.title = "Données locales à ce navigateur (Firebase non configuré)";
  }
}

function createNewcomer(fields) {
  const d = loadData();
  d.seq += 1;
  const nc = {id: d.seq, ...fields, status:{}, createdAt: new Date().toISOString()};
  d.newcomers.push(nc);
  saveData(d);
  return nc.id;
}
function getNewcomer(id) { return loadData().newcomers.find(n => n.id === id); }
function updateNewcomer(id, patch) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  Object.assign(n, patch);
  saveData(d);
}
function deleteNewcomer(id) {
  const d = loadData();
  d.newcomers = d.newcomers.filter(n => n.id !== id);
  saveData(d);
}
function setArchived(id, archived) {
  updateNewcomer(id, {archived: archived});
}

/* ============================================================
   UTILITAIRES
   ============================================================ */
function slugify(name) {
  return name.normalize("NFKD").replace(/[̀-ͯ]/g, "")
    .trim().toLowerCase().replace(/\s+/g, "-");
}
function chiliLink(name) {
  return `https://pennylane.chilipiper.com/shared/${slugify(name)}/link-60min`;
}
function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
// Statut unifié : lit n.status ET n.training (compat anciennes données), écrit dans n.status
function itemDone(n, key) {
  return (n.status||{})[key] === "done" || (n.training||{})[key] === "done";
}
// Statut par colonne de rôle (tl / newcomer / mentor)
function itemRoleDone(n, key, role) {
  return ((n.roleStatus||{})[key]||{})[role] === "done";
}
function setItemRoleStatus(id, key, role, done) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.roleStatus) n.roleStatus = {};
  if (!n.roleStatus[key]) n.roleStatus[key] = {};
  n.roleStatus[key][role] = done ? "done" : "pending";
  if (!n.roleDates) n.roleDates = {};
  if (!n.roleDates[key]) n.roleDates[key] = {};
  if (done) n.roleDates[key][role] = {at: new Date().toISOString(), by: getUser()};
  else delete n.roleDates[key][role];
  saveData(d);
}
function itemRoleStamp(n, key, role) {
  const raw = ((n.roleDates||{})[key]||{})[role];
  if (!raw) return null;
  const dt = new Date(raw.at);
  const j = String(dt.getDate()).padStart(2,"0");
  const m = String(dt.getMonth()+1).padStart(2,"0");
  return {date:`${j}/${m}/${dt.getFullYear()}`, by: raw.by||""};
}
function setItemStatus(id, key, status) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.status) n.status = {};
  n.status[key] = status;
  if (n.training && key in n.training) n.training[key] = status;
  if (!n.dates) n.dates = {};
  if (status === "done") n.dates[key] = {at: new Date().toISOString(), by: getUser()};
  else delete n.dates[key];
  saveData(d);
}
// Note libre par item (ex: "ce qu'on doit montrer") — éditable, partagée
function getItemNote(n, key) { return (n.itemNotes||{})[key] || ""; }
function saveItemNote(id, key, text) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.itemNotes) n.itemNotes = {};
  if (text && text.trim()) n.itemNotes[key] = text.trim();
  else delete n.itemNotes[key];
  saveData(d);
}
// Descriptions de référence (référentiel commun, partagé) — override global de it.desc
function getDesc(item) {
  const ov = (DATA.descOverrides || {})[item.key];
  return ov !== undefined ? ov : (item.desc || "");
}
function saveDesc(key, text) {
  const d = loadData();
  if (!d.descOverrides) d.descOverrides = {};
  d.descOverrides[key] = (text || "").trim();
  saveData(d);
}
// Libellés de référence (référentiel commun, partagé) — override global de it.label
function getLabel(item) {
  const ov = (DATA.labelOverrides || {})[item.key];
  return ov !== undefined && ov !== "" ? ov : (item.label || "");
}
function saveLabel(key, text) {
  const d = loadData();
  if (!d.labelOverrides) d.labelOverrides = {};
  d.labelOverrides[key] = (text || "").trim();
  saveData(d);
}

/* --- LIVRET D'INTÉGRATION : stockage par newcomer --- */
function livretOf(n) { return n.livret || {niveaux:{}, comments:{}, signatures:{}}; }
function getLivretNiveau(n, itemKey, who) {
  const lv = (n.livret && n.livret.niveaux && n.livret.niveaux[itemKey]) || {};
  return lv[who] || "";
}
function setLivretNiveau(id, itemKey, who, val) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.niveaux) n.livret.niveaux = {};
  if (!n.livret.niveaux[itemKey]) n.livret.niveaux[itemKey] = {};
  const cur = n.livret.niveaux[itemKey][who];
  if (cur === val) { // clic sur le niveau déjà sélectionné = désélection
    n.livret.niveaux[itemKey][who] = "";
    delete n.livret.niveaux[itemKey][who + "By"];
    delete n.livret.niveaux[itemKey][who + "At"];
  } else {
    n.livret.niveaux[itemKey][who] = val;
    n.livret.niveaux[itemKey][who + "By"] = getUser();
    n.livret.niveaux[itemKey][who + "At"] = new Date().toISOString();
  }
  saveData(d);
}
function getLivretStamp(n, itemKey, who) {
  const lv = (n.livret && n.livret.niveaux && n.livret.niveaux[itemKey]) || {};
  const iso = lv[who + "At"]; if (!iso) return "";
  const by = lv[who + "By"] || "";
  const dt = new Date(iso);
  const j = String(dt.getDate()).padStart(2,"0"), m = String(dt.getMonth()+1).padStart(2,"0");
  return `validé${by?" par "+by:""} le ${j}/${m}/${dt.getFullYear()}`;
}
// Commentaire par compétence (item) du livret
function getLivretItemComment(n, itemKey) {
  return (n.livret && n.livret.itemComments && n.livret.itemComments[itemKey]) || "";
}
function saveLivretItemComment(id, itemKey, text) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.itemComments) n.livret.itemComments = {};
  if (text && text.trim()) n.livret.itemComments[itemKey] = text.trim();
  else delete n.livret.itemComments[itemKey];
  saveData(d);
}
function getLivretComment(n, sectionKey, who) {
  const c = (n.livret && n.livret.comments && n.livret.comments[sectionKey]) || {};
  return c[who] || "";
}
function saveLivretComment(id, sectionKey, who, text) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.comments) n.livret.comments = {};
  if (!n.livret.comments[sectionKey]) n.livret.comments[sectionKey] = {};
  n.livret.comments[sectionKey][who] = text;
  saveData(d);
}
// Verrouillage du livret (fige coches/commentaires/signatures)
function isLivretLocked(n) { return !!(n.livret && n.livret.locked); }
function setLivretLocked(id, locked) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (locked) { n.livret.locked = true; n.livret.lockedBy = getUser(); n.livret.lockedAt = new Date().toISOString(); }
  else { n.livret.locked = false; }
  saveData(d);
}
function getLivretSignature(n, who) {
  return (n.livret && n.livret.signatures && n.livret.signatures[who]) || "";
}
function saveLivretSignature(id, who, text) {
  const d = loadData();
  const n = d.newcomers.find(x => x.id === id);
  if (!n) return;
  if (!n.livret) n.livret = {niveaux:{}, comments:{}, signatures:{}};
  if (!n.livret.signatures) n.livret.signatures = {};
  n.livret.signatures[who] = text;
  saveData(d);
}
// Renvoie {date, by} — compat ancien format (string ISO sans auteur)
function itemStamp(n, key) {
  const raw = (n.dates||{})[key];
  if (!raw) return null;
  const iso = typeof raw === "string" ? raw : raw.at;
  const by = typeof raw === "string" ? "" : (raw.by || "");
  const dt = new Date(iso);
  const j = String(dt.getDate()).padStart(2,"0");
  const m = String(dt.getMonth()+1).padStart(2,"0");
  return {date: `${j}/${m}/${dt.getFullYear()}`, by};
}
// Compteurs par cadre / onglet / global
function countFrame(n, frameKey) {
  const f = frameDef(frameKey); if (!f || f.noCheck) return {done:0,total:0};
  const items = frameItems(frameKey).filter(it => !it.heading); // les sous-titres ne comptent pas
  const cols = frameColsFor(frameKey);
  const done = cols
    ? items.filter(it => cols.every(rc => itemRoleDone(n, it.key, rc.key))).length
    : items.filter(it => itemDone(n, it.key)).length;
  return {done, total:items.length};
}
function countTab(n, tab) {
  if (!tab.frames) return {done:0, total:0}; // onglet livret : pas de cadres standard
  return tabFrameKeys(tab).reduce((acc,fk) => {
    const c = countFrame(n, fk); acc.done+=c.done; acc.total+=c.total; return acc;
  }, {done:0,total:0});
}
function countAll(n) {
  const s = getStructure();
  const hidden = s.hiddenItems || [];
  const customKeys = Object.values(s.customItems || {}).flat().map(it => it.key);
  const baseKeys = ALL_ITEMS.map(it => it.key);
  const allKeys = baseKeys.concat(customKeys).filter(k => !hidden.includes(k));
  // Clés comptées via colonnes (Formation Pennylane ou cadres à colonnes, ex. checklist de contrôle) ;
  // toutes les autres via la case unique. On mémorise les colonnes par clé.
  const colsByKey = {};
  Object.keys(FRAMES).forEach(fk => {
    const cols = frameColsFor(fk);
    if (cols) frameItems(fk).forEach(it => { colsByKey[it.key] = cols; });
  });
  return allKeys.filter(k => colsByKey[k]
    ? colsByKey[k].every(rc => itemRoleDone(n, k, rc.key))
    : itemDone(n, k)).length;
}
function totalAll() {
  const s = getStructure();
  const hidden = s.hiddenItems || [];
  const customKeys = Object.values(s.customItems || {}).flat().map(it => it.key);
  const baseKeys = ALL_ITEMS.map(it => it.key);
  return baseKeys.concat(customKeys).filter(k => !hidden.includes(k)).length;
}

// Migration : anciennes lignes custom stockées par newcomer (n.custom) → structure globale
function migrateCustomItems() {
  const d = loadData();
  let changed = false;
  (d.newcomers || []).forEach(n => {
    if (n.custom && Object.keys(n.custom).length) {
      if (!d.structure) d.structure = {};
      const s = d.structure;
      if (!s.customItems) s.customItems = {};
      Object.entries(n.custom).forEach(([fk, items]) => {
        if (!s.customItems[fk]) s.customItems[fk] = [];
        items.forEach(it => {
          if (!s.customItems[fk].some(x => x.key === it.key)) s.customItems[fk].push(it);
        });
      });
      delete n.custom;
      changed = true;
    }
  });
  if (changed) saveData(d);
}

      const locked = (role === "admin");
      return `<td style="padding:7px 10px; text-align:center;">
        <input type="checkbox" ${on?"checked":""} ${locked?"disabled":""}
          onchange="togglePerm('${perm.key}','${role}',this.checked)"
          style="width:16px; height:16px; cursor:${locked?"not-allowed":"pointer"};" title="${locked?"L'Admin conserve toujours ce droit":""}">
      </td>`;
    }
    return `<td style="padding:7px 10px; text-align:center;">${on?"✅":"❌"}</td>`;
  };
  const section = (title, cat) => {
    const permRows = PERMISSIONS.filter(p => p.cat === cat).map(p =>
      `<tr style="border-top:1px solid var(--border);">
        <td style="padding:7px 10px;">${p.label}</td>
        ${PERM_ROLES.map(r => cell(p, r)).join("")}
      </tr>`).join("");
    return `<tr><td colspan="${PERM_ROLES.length+1}" style="padding:12px 10px 4px; font-weight:800; color:var(--teal-mid); text-transform:uppercase; font-size:0.72rem; letter-spacing:.5px;">${title}</td></tr>${permRows}`;
  };
  return `<div class="card">
    <div class="phase-title">Droits par rôle${editable ? ` <span style="font-weight:600; text-transform:none; letter-spacing:0; color:var(--text-muted); font-size:0.75rem;">— cases modifiables, enregistrées pour tous</span>` : ""}</div>
    <table style="width:100%; border-collapse:collapse; font-size:0.82rem;">
      <thead><tr style="color:var(--teal-mid); text-transform:uppercase; font-size:0.72rem; letter-spacing:.4px;">
        <th style="padding:8px 10px; text-align:left;">Droit</th>
        ${PERM_ROLES.map(r => `<th style="padding:8px 10px; text-align:center;">${ACCESS_ROLE_LABELS[r]}</th>`).join("")}
      </tr></thead>
      <tbody>
        ${section("Actions", "action")}
        ${section("Accès (onglets)", "access")}
      </tbody>
    </table>
    ${editable ? `<div style="margin-top:12px; text-align:right;"><button class="btn btn-sm btn-outline" onclick="resetPerms()">↺ Réinitialiser les droits par défaut</button></div>` : ""}
  </div>`;
}
function togglePerm(permKey, role, val) {
  if (!isAdmin()) return;
  if (role === "admin") return; // l'Admin garde ses droits
  setPerm(permKey, role, val);
  toast("Droit mis à jour");
  renderDroits();
}
function resetPerms() {
  if (!isAdmin()) return;
  saveStructure(s => { s.perms = {}; });
  toast("Droits réinitialisés");
  renderDroits();
}
function changeAccessRole(lp, role) {
  // "newcomer" = valeur par défaut → si c'est aussi le défaut codé, on retire l'override pour rester propre
  const isDefaultTL = ACCESS_DEFAULTS.tl.includes(lp);
  const isDefaultMentor = ACCESS_DEFAULTS.mentor.includes(lp);
  const naturalDefault = isDefaultTL ? "tl" : (isDefaultMentor ? "mentor" : "newcomer");
  setAccessRole(lp, role === naturalDefault ? null : role);
  toast("Rôle mis à jour");
  renderDroits();
}
// Prévisualiser l'app comme une autre personne (impersonation, réservé à l'Admin)
function startImpersonate(email) {
  if (!realIsAdmin()) return;
  setImpersonate(email);
  toast("Prévisualisation : " + email);
  go(""); // repart du dashboard dans la vue impersonée
}

    const counter = t.frames && c.total ? ` <span style="font-weight:600; color:var(--text-muted); font-size:0.78rem;">${c.done}/${c.total}</span>` : "";
    return `<button style="${tabStyle(tabKey===t.key)}" onclick="go('newcomer/${n.id}/${t.key}')">${esc(t.label)}${counter}</button>`;

        <h1 style="font-size:1.6rem; font-weight:800; color:var(--teal-dark); letter-spacing:-0.4px;">${esc(n.name)}${n.archived?' <span class="badge badge-pending" style="vertical-align:middle;">Archivé</span>':''}</h1>
        <div style="color:var(--text-muted); font-size:0.875rem; margin-top:6px; display:flex; gap:16px; flex-wrap:wrap; font-weight:500;">
          <span>${esc(n.email)}</span>
          ${n.slack_handle?`<span>· ${esc(n.slack_handle)}</span>`:""}
          ${n.role?`<span>· ${esc(n.role)}</span>`:""}

        </div>

      ${hasPerm("edit_newcomer") ? `<button class="btn btn-sm btn-outline" onclick="openEditNewcomer(${n.id})">✏️ Modifier</button>` : ""}

}

// Modale d'édition d'un newcomer (nom, email, handle, rôle, date, notes)
function openEditNewcomer(id) {
  if (!requirePerm("edit_newcomer")) return;
  const n = getNewcomer(id);
  if (!n) return;
  const roleOpts = getRoles().map(r => `<option value="${esc(r)}" ${n.role===r?"selected":""}>${esc(r)}</option>`).join("");
  const body = `
    <div style="display:grid; gap:14px;">
      <div><label>Nom complet *</label><input id="edit-name" value="${esc(n.name)}"></div>
      <div><label>Email</label><input id="edit-email" type="email" value="${esc(n.email)}"></div>
      <div><label>Handle Slack</label><input id="edit-slack" value="${esc(n.slack_handle||"")}"></div>
      <div><label>Rôle</label><select id="edit-role">${roleOpts}</select></div>
      <div><label>Date d'arrivée</label><input id="edit-date" type="date" value="${esc(n.arrival_date||"")}"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button class="btn btn-sm btn-outline" onclick="closeModal()">Annuler</button>
        <button class="btn btn-sm btn-primary" onclick="saveEditNewcomer(${id})">Enregistrer</button>
      </div>
    </div>`;
  document.getElementById("modal-title").textContent = "Modifier le newcomer";
  document.getElementById("modal-body").innerHTML = body;
  document.getElementById("modal").classList.add("open");
}
function saveEditNewcomer(id) {
  if (!requirePerm("edit_newcomer")) return;
  const name = document.getElementById("edit-name").value.trim();
  const email = document.getElementById("edit-email").value.trim();
  if (!name || !email) { alert("Nom et email obligatoires."); return; }
  const patch = {
    name, email,
    slack_handle: document.getElementById("edit-slack").value.trim(),
    role: document.getElementById("edit-role").value,
    arrival_date: document.getElementById("edit-date").value,
  };
  // 1) Fermer la modale AVANT tout (garanti, même si un render échoue ensuite)
  document.getElementById("modal").classList.remove("open");
  // 2) Sauvegarder puis rafraîchir (protégé)
  try {
    updateNewcomer(id, patch);
    renderDetail(id, curTabKey());
    toast("Newcomer mis à jour");
  } catch (e) {
    console.warn("Erreur maj newcomer :", e.message);
  }
}

// Rend un cadre (checklist) : items base + custom (global), avec ajout/suppression + drag&drop
function frameCard(n, frameKey, tabKey) {
  const f = frameDef(frameKey);
  if (!f) return "";
  const tl = hasPerm("edit_structure"); // outils d'édition de structure (réorg, ajout/suppr)
  const allItems = frameItems(frameKey);
  const noCheck = !!f.noCheck;
  const editNotes = !!f.editableNotes;
  const editDesc = !!f.editableDesc && hasPerm("edit_desc"); // édition des descriptions
  const isCustomFrame = !!f.custom;
  const editLabel = !!f.editableLabel;
  const cols = frameColsFor(frameKey); // colonnes du cadre (3 rôles, checklist, ou null)
  const countItems = allItems.filter(it => !it.heading); // exclut les sous-titres
  const done = cols
    ? countItems.filter(it => cols.every(rc => itemRoleDone(n, it.key, rc.key))).length
    : countItems.filter(it => itemDone(n, it.key)).length;

  // Bloc note éditable "ce qu'on doit montrer" (cadres editableNotes)
  const noteBlock = it => {
    if (!editNotes) return "";
    const note = getItemNote(n, it.key);
    return `<div style="margin-top:6px; margin-left:32px;">
      <textarea id="note-${it.key}" placeholder="Ce qu'on doit montrer… (cliquer pour éditer)"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';"
        onblur="saveItemNoteFromUI(${n.id}, '${it.key}', this.value)"
        style="width:100%; min-height:34px; font-size:0.8rem; color:var(--teal-dark); border:1px solid var(--border); border-radius:8px; padding:6px 9px; font-family:'Manrope',sans-serif; resize:none; background:${note?'#FFFFFF':'#FAFDFD'};">${esc(note)}</textarea>
    </div>`;
  };

  const handle = tl ? `<span class="drag-handle" title="Glisser pour réordonner" style="cursor:grab; color:#B8C4C4; font-size:0.95rem; padding:0 2px; user-select:none;">⠿</span>` : "";

  let rows = allItems.map(it => {
    // Sous-titre de section (non cochable, non compté) : sépare les groupes de lignes dans un cadre fusionné
    if (it.heading) {
      const delH = tl ? `<button class="btn btn-sm btn-danger-ghost" title="Supprimer ce sous-titre" style="margin-left:auto;" onclick="deleteLine('${frameKey}', '${it.key}', ${it.custom?1:0})">✕</button>` : "";
      return `<div class="dr-row" draggable="true" data-item="${it.key}" data-frame="${frameKey}">
        <div class="task-row" style="border-bottom:none; padding-top:14px; padding-bottom:2px; align-items:center;">
          ${tl ? `<span class="drag-handle" title="Glisser pour réordonner" style="cursor:grab; color:#B8C4C4; font-size:0.95rem; padding:0 2px; user-select:none;">⠿</span>` : ""}
          <div style="font-size:0.8rem; font-weight:800; color:var(--teal-mid); text-transform:uppercase; letter-spacing:.5px;">${esc(it.label)}</div>
          ${delH}
        </div>
      </div>`;
    }
    const st = itemDone(n, it.key);
    let right = "";
    if (it.link) right += `<a href="${it.link}" target="_blank" class="task-link btn btn-sm btn-outline" style="white-space:nowrap;">${esc(it.linkLabel || "Ouvrir")}</a>`;
    if (Array.isArray(it.links)) it.links.forEach(l => {
      if (l.url) right += `<a href="${l.url}" target="_blank" class="task-link btn btn-sm btn-outline" style="white-space:nowrap;">${esc(l.label || "Ouvrir")}</a>`;
      else right += `<span class="btn btn-sm" style="white-space:nowrap; background:#EEF2F2; color:var(--text-muted); cursor:default;" title="Lien à venir">${esc(l.label || "")} (à venir)</span>`;
    });
    if (it.action) {
      const labels = {slack:"Préparer Slack", jira_connect:"Ticket Jira", jira_chift:"Ticket Jira", jira_metabase:"Ticket Jira", jira_tresorit:"Ticket Jira", swan:"Préparer DM Vincent", braga:"Préparer msg Braga", ops_chili:"Ticket OPS", ops_modjo:"Ticket OPS", ops_intercom:"Ticket OPS"};
      right += `<button class="btn btn-sm btn-slack" style="white-space:nowrap;" onclick="openAction('${it.action}', ${n.id})">${labels[it.action]}</button>`;
    }
    if (tl) right += `<button class="btn btn-sm btn-danger-ghost" title="Supprimer cette ligne" onclick="deleteLine('${frameKey}', '${it.key}', ${it.custom?1:0})">✕</button>`;
    // Cadre "noCheck" : pas de case à cocher, juste une puce statique
    if (noCheck) {
      const ncLabel = editLabel ? getLabel(it) : (it.label || "");
      const ncDesc = editDesc ? getDesc(it) : (it.desc || "");
      const ncEditBtn = editLabel
        ? `<button class="btn btn-sm btn-outline" title="Modifier l'intitulé" style="white-space:nowrap;" onclick="editLabelUI('${it.key}')">✎</button>`
        : (editDesc ? `<button class="btn btn-sm btn-outline" title="Modifier la description" style="white-space:nowrap;" onclick="editDescUI('${it.key}')">✎</button>` : "");
      const ncLabelEditor = editLabel ? `<div id="label-edit-${it.key}" style="display:none; margin-top:6px; margin-left:24px;">
          <textarea id="label-ta-${it.key}" style="width:100%; min-height:38px; font-size:0.875rem; font-weight:500; color:var(--teal-dark); border:1px solid var(--teal-mid); border-radius:8px; padding:6px 9px; font-family:'Manrope',sans-serif; resize:vertical;">${esc(ncLabel)}</textarea>
          <div style="text-align:right; margin-top:6px;">
            <button class="btn btn-sm btn-outline" onclick="cancelLabelUI('${it.key}')">Annuler</button>
            <button class="btn btn-sm btn-primary" style="margin-left:6px;" onclick="saveLabelUI('${it.key}')">Enregistrer</button>
          </div>
        </div>` : "";
      const ncEditor = editDesc ? `<div id="desc-edit-${it.key}" style="display:none; margin-top:6px; margin-left:24px;">
          <textarea id="desc-ta-${it.key}" style="width:100%; min-height:48px; font-size:0.8rem; color:var(--teal-dark); border:1px solid var(--teal-mid); border-radius:8px; padding:6px 9px; font-family:'Manrope',sans-serif; resize:vertical;">${esc(ncDesc)}</textarea>
          <div style="text-align:right; margin-top:6px;">
            <button class="btn btn-sm btn-outline" onclick="cancelDescUI('${it.key}')">Annuler</button>
            <button class="btn btn-sm btn-primary" style="margin-left:6px;" onclick="saveDescUI('${it.key}')">Enregistrer</button>
          </div>
        </div>` : "";
      return `<div class="dr-row" draggable="true" data-item="${it.key}" data-frame="${frameKey}">
        <div class="task-row">
        ${handle}
        <div style="width:16px; flex-shrink:0; color:var(--teal-mid); font-weight:800; text-align:center;">›</div>
        <div style="flex:1;">
          <div class="task-label" id="label-view-${it.key}">${esc(ncLabel)}</div>
          ${ncLabelEditor}
          ${ncDesc?`<div id="desc-view-${it.key}" style="font-size:0.77rem; color:#8AABAB; margin-top:2px; white-space:pre-wrap;">${esc(ncDesc)}</div>`:`<div id="desc-view-${it.key}" style="font-size:0.77rem; color:#B8C4C4; margin-top:2px; font-style:italic;">${editDesc?"(pas de description — cliquer ✎ pour ajouter)":""}</div>`}
          ${ncEditor}
        </div>
        ${ncEditBtn}
        ${right}
        </div>
      </div>`;
    }
    const useRoles = !!cols;
    const allRolesDone = useRoles && cols.every(rc => itemRoleDone(n, it.key, rc.key));
    const descTxt = editDesc ? getDesc(it) : (it.desc || "");
    const editBtn = editDesc ? `<button class="btn btn-sm btn-outline" title="Modifier la description" style="white-space:nowrap;" onclick="editDescUI('${it.key}')">✎</button>` : "";
    const descEditor = editDesc ? `<div id="desc-edit-${it.key}" style="display:none; margin-top:6px; margin-left:32px;">
        <textarea id="desc-ta-${it.key}" style="width:100%; min-height:48px; font-size:0.8rem; color:var(--teal-dark); border:1px solid var(--teal-mid); border-radius:8px; padding:6px 9px; font-family:'Manrope',sans-serif; resize:vertical;">${esc(descTxt)}</textarea>
        <div style="text-align:right; margin-top:6px;">
          <button class="btn btn-sm btn-outline" onclick="cancelDescUI('${it.key}')">Annuler</button>
          <button class="btn btn-sm btn-primary" style="margin-left:6px;" onclick="saveDescUI('${it.key}')">Enregistrer</button>
        </div>
      </div>` : "";
    // Cadres à colonnes : Formation Pennylane (3 rôles) ou checklist de contrôle (TL/Newcomer).
    // Ailleurs : case à cocher unique (comportement d'origine).
    const roleCols = useRoles ? `<div class="role-cols">
      ${cols.map(rc => {
        const done = itemRoleDone(n, it.key, rc.key);
        const stamp = done ? itemRoleStamp(n, it.key, rc.key) : null;
        const stampHtml = stamp ? `<div class="role-stamp" title="${esc(stamp.by ? stamp.by+" le "+stamp.date : stamp.date)}">${esc(stamp.date)}${stamp.by ? "<br>"+esc(stamp.by) : ""}</div>` : "";
        return `<div class="role-col">
          <div class="role-check ${done?'done':''}" onclick="toggleRoleItem(${n.id}, '${it.key}', '${rc.key}')" title="${esc(rc.label)}">${done?'✓':''}</div>
          ${stampHtml}
        </div>`;
      }).join("")}
    </div>` : "";
    const singleCheck = useRoles ? "" : `<div class="task-check ${st?'done':''}" onclick="toggleItem(${n.id}, '${it.key}')">${st?'✓':''}</div>`;
    const singleStamp = !useRoles ? itemStamp(n, it.key) : null;
    const singleStampHtml = singleStamp ? `<div style="font-size:0.72rem; color:var(--green-dark); font-weight:600; margin-top:2px;">✓ fait le ${esc(singleStamp.date)}${singleStamp.by ? " par " + esc(singleStamp.by) : ""}</div>` : "";
    const labelDone = useRoles ? allRolesDone : st;
    return `<div class="dr-row" draggable="true" data-item="${it.key}" data-frame="${frameKey}">
      <div class="task-row" style="border-bottom:none;">
        ${handle}
        ${singleCheck}
        <div style="flex:1;">
          <div class="task-label ${labelDone?'done':''}">${esc(it.label)}</div>
          ${descTxt?`<div id="desc-view-${it.key}" style="font-size:0.77rem; color:#8AABAB; margin-top:2px; white-space:pre-wrap;">${esc(descTxt)}</div>`:`<div id="desc-view-${it.key}" style="font-size:0.77rem; color:#B8C4C4; margin-top:2px; font-style:italic;">${editDesc?"(pas de description — cliquer ✎ pour ajouter)":""}</div>`}
          ${singleStampHtml}
        </div>
        ${editBtn}
        ${right}
        ${roleCols}
      </div>
      ${descEditor}
      ${noteBlock(it)}
    </div>`;
  }).join("");

  const counter = noCheck ? "" : `<span style="font-size:0.78rem; font-weight:600; color:var(--text-muted); margin-left:auto;">${done}/${countItems.length}</span>`;
  const collapsed = isCollapsed(frameKey);
  const chevron = `<span style="display:inline-block; width:16px; transition:transform .15s; transform:rotate(${collapsed?-90:0}deg); color:var(--teal-mid);">▾</span>`;
  const delFrameBtn = isCustomFrame ? `<button class="btn btn-sm btn-danger-ghost" title="Supprimer ce cadre" style="margin-left:6px;" onclick="event.stopPropagation(); deleteCustomFrame('${tabKey}','${frameKey}')">✕</button>` : "";
  const headerRightHtml = noCheck ? counter : `<span style="font-size:0.78rem; font-weight:600; color:var(--text-muted); ${cols?'':'margin-left:auto;'}">${done}/${countItems.length}</span>
    ${cols ? `<div class="role-cols-header">
      ${cols.map(rc=>`<div class="role-col-head">${esc(rc.label)}</div>`).join("")}
    </div>` : ""}`;

  const compactStyle = f.compact ? "font-size:0.8rem;" : "";
  const addLineHtml = tl ? `<div style="margin-top:12px; padding-top:12px; border-top:1px dashed var(--border);">
      <a style="font-size:0.8rem; font-weight:700; color:var(--teal-mid); cursor:pointer;" onclick="addCustomItem('${frameKey}')">+ Ajouter une ligne</a>
    </div>` : "";
  // Commentaire TL de fin de cadre (ex. checklist de contrôle OB blanc) — stocké comme note d'item réservée
  const tlCommentHtml = (f.tlComment && !collapsed) ? (() => {
    const ckey = frameKey + "__tlcomment";
    const val = getItemNote(n, ckey);
    return `<div style="margin-top:14px; padding-top:12px; border-top:1px dashed var(--border);">
      <div style="font-size:0.78rem; font-weight:800; color:var(--teal-mid); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px;">Commentaire TL</div>
      <textarea id="note-${ckey}" placeholder="Bilan du contrôle : réussi / à retravailler, points forts, axes de progrès…"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';"
        onblur="saveItemNoteFromUI(${n.id}, '${ckey}', this.value)"
        style="width:100%; min-height:60px; font-size:0.85rem; color:var(--teal-dark); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-family:'Manrope',sans-serif; resize:vertical; background:${val?'#FFFFFF':'#FAFDFD'};">${esc(val)}</textarea>
    </div>`;
  })() : "";
  const bodyHtml = collapsed ? "" : `<div class="dr-rows${f.compact?' compact-frame':''}" data-frame="${frameKey}" style="${compactStyle}">${rows}</div>${addLineHtml}${tlCommentHtml}`;
  const frameHandle = tl ? `<span class="frame-drag-handle" title="Glisser pour déplacer le cadre" style="cursor:grab; color:#B8C4C4; user-select:none;">⠿</span>` : "";
  return `<div class="dr-frame card" draggable="true" data-frameroot="${frameKey}" data-tab="${tabKey}">
    <div class="phase-title" style="margin-bottom:${collapsed?'0':'14px'}; padding-bottom:${collapsed?'0':'10px'}; border-bottom:${collapsed?'none':'2px solid var(--teal-light)'}; display:flex; align-items:center; gap:8px;">
      ${frameHandle}
      <span style="cursor:pointer; display:flex; align-items:center; gap:8px; flex:1;" onclick="toggleCollapse('${frameKey}')">${chevron}<span>${esc(f.title)}</span></span>
      ${headerRightHtml}
      ${delFrameBtn}
    </div>
    ${bodyHtml}
  </div>`;
}

// Un onglet est-il accessible au rôle courant ?
function canAccessTab(tab) {
  if (tab.adminOnly) return isAdmin();               // onglet réservé Admin (ex. Méthode OB brouillon)
  if (tab.droits) return hasPerm("manage_rights");   // onglet Gestion des droits
  const permKey = "access_" + tab.key;               // access_demarrage, access_acces, …
  if (PERM_BY_KEY[permKey]) return hasPerm(permKey);
  return true;
}
function firstAllowedTabKey() {
  const t = TABS.find(t => canAccessTab(t) && !t.droits);
  return t ? t.key : "livret";
}

function renderDetail(id, tabKey) {
  const n = getNewcomer(id);
  if (!n) { go(""); return; }
  // Un newcomer ne peut consulter QUE sa propre fiche
  if (!canViewNewcomer(n)) {
    const own = ownNewcomer();
    if (own && own.id !== id) { go("newcomer/" + own.id + "/" + firstAllowedTabKey()); return; }
    document.getElementById("app").innerHTML = `<div class="card" style="text-align:center; padding:60px; color:var(--text-muted);">

  const extra = tab.key === "demarrage" ? `

      <textarea id="notes-area" rows="4">${esc(n.notes)}</textarea>

  const progressHtml = c.total ? `

      <div style="display:flex; align-items:center; gap:16px;">

        <div class="progress-bar-wrap" style="background:var(--teal-mid);"><div class="progress-bar-fill" style="width:${pct}%; background:var(--green);"></div></div>
        <span style="font-size:0.875rem; font-weight:800; white-space:nowrap; color:var(--green);">${c.done}/${c.total}</span>
      </div>
    </div>` : "";

  document.getElementById("app").innerHTML = detailHeader(n, tab.key) + progressHtml + `
    ${framesHtml}
    ${extra}
  `;
  setupDnD(id, tab.key);
}

/* ============================================================
   DRAG & DROP — réordonner cadres (dans l'onglet) et lignes (dans un cadre)
   Ordre stocké globalement (partagé). Réordonnancement de lignes = même cadre.
   ============================================================ */
function setupDnD(id, tabKey) {
  const tab = TABS.find(t => t.key === tabKey);
  if (!tab || !tab.frames) return;

  // --- Cadres --- (drag seulement depuis la poignée du cadre)
  const framesWrap = document.querySelector('.dr-frames[data-tab="'+tabKey+'"]');
  if (framesWrap) {
    let dragFrame = null;
    framesWrap.querySelectorAll('.dr-frame').forEach(el => {
      el.setAttribute('draggable', 'false');
      const h = el.querySelector('.frame-drag-handle');
      if (h) {
        h.addEventListener('mousedown', () => el.setAttribute('draggable', 'true'));
        document.addEventListener('mouseup', () => el.setAttribute('draggable', 'false'));
      }
      el.addEventListener('dragstart', e => { dragFrame = el; el.style.opacity = '0.5'; });
      el.addEventListener('dragend', () => { if (dragFrame) dragFrame.style.opacity=''; dragFrame=null; el.setAttribute('draggable','false'); });
      el.addEventListener('dragover', e => {
        if (!dragFrame || dragFrame===el) return;
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height/2;
        if (after) el.after(dragFrame); else el.before(dragFrame);
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        const order = [...framesWrap.querySelectorAll('.dr-frame')].map(x => x.dataset.frameroot);
        saveFrameOrder(tabKey, order);
      });
    });
  }

  // --- Lignes (dans chaque cadre) --- (drag seulement depuis la poignée de ligne)
  document.querySelectorAll('.dr-rows').forEach(rowsWrap => {
    const frameKey = rowsWrap.dataset.frame;
    let dragRow = null;
    rowsWrap.querySelectorAll('.dr-row').forEach(el => {
      el.setAttribute('draggable', 'false');
      const h = el.querySelector('.drag-handle');
      if (h) {
        h.addEventListener('mousedown', () => el.setAttribute('draggable', 'true'));
        document.addEventListener('mouseup', () => el.setAttribute('draggable', 'false'));
      }
      el.addEventListener('dragstart', e => { e.stopPropagation(); dragRow = el; el.style.opacity='0.5'; });
      el.addEventListener('dragend', e => { e.stopPropagation(); if (dragRow) dragRow.style.opacity=''; dragRow=null; el.setAttribute('draggable','false'); });
      el.addEventListener('dragover', e => {
        if (!dragRow || dragRow===el || el.dataset.frame!==frameKey) return;
        e.preventDefault(); e.stopPropagation();
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height/2;
        if (after) el.after(dragRow); else el.before(dragRow);
      });
      el.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        const order = [...rowsWrap.querySelectorAll('.dr-row')].map(x => x.dataset.item);
        saveItemOrder(frameKey, order);
      });
    });
  });
}

function saveFrameOrder(tabKey, order) {
  saveStructure(s => { s.frameOrder[tabKey] = order; });
}
function saveItemOrder(frameKey, order) {
  saveStructure(s => { s.itemOrder[frameKey] = order; });

  if (!requirePerm("edit_structure")) return;
  if (!confirm("Supprimer cette ligne ?")) return;
  saveStructure(s => {
    if (isCustom) {
      if (s.customItems[frameKey]) s.customItems[frameKey] = s.customItems[frameKey].filter(it => it.key !== key);
    } else {
      if (!s.hiddenItems.includes(key)) s.hiddenItems.push(key);

  const frameKey = "cf_" + tabKey + "_" + Date.now();
  saveStructure(s => {
    s.customFrames[frameKey] = {title: title.trim()};

    const base = (s.frameOrder[tabKey] && s.frameOrder[tabKey].length) ? s.frameOrder[tabKey] : (tab.frames ? tab.frames.slice() : []);
    s.frameOrder[tabKey] = base.concat([frameKey]);

// Bloc récap infos IC réutilisé dans les messages pré-remplis (Jira, OPS…)
function icInfoText(n) {
  const lignes = [`Nom : ${n.name}`];
  if (n.email) lignes.push(`Email : ${n.email}`);
  if (n.role) lignes.push(`Rôle : ${n.role}`);
  if (n.arrival_date) lignes.push(`Date d'arrivée : ${n.arrival_date}`);
  return lignes.join("\n");
}

const OPS_NOTION = "https://app.notion.com/p/scribetech/28f2276c03bf806c8606e0923487e365?pvs=106";

function openAction(action, id) {
  const n = getNewcomer(id);
  const roleStr = n.role ? ` (${n.role})` : "";
  let title = "", body = "", link = "", linkLabel = "Ouvrir";

  if (action === "slack") {
    title = "Accès Slack à créer manuellement";
    body = `<p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:16px;">Ajoute <strong style="color:var(--teal-dark);">${esc(n.email)}</strong> dans le canal et les 2 groupes d'utilisateurs :</p>
      <a href="${SLACK_LINKS.channel}" target="_blank" class="btn btn-slack" style="width:100%; justify-content:center; margin-bottom:8px;">Ouvrir #professional-services</a>
      <a href="${SLACK_LINKS.usergroup_cs}" target="_blank" class="btn btn-outline" style="width:100%; justify-content:center; margin-bottom:8px;">Groupe @cs.services</a>
      <a href="${SLACK_LINKS.usergroup_ob}" target="_blank" class="btn btn-outline" style="width:100%; justify-content:center; margin-bottom:8px;">Groupe @ob</a>`;
    // Le bouton principal (marque la tâche done) rouvre le canal
    link = SLACK_LINKS.channel; linkLabel = "Terminé — ouvrir le canal";
  }
  else if (action === "jira_connect") {
    title = "Ticket Jira — Pennylane Connect";
    body = blockCopy("Titre", `Accès Pennylane Connect étendu — ${n.name}`)
      + blockCopy("Description", `Bonjour,\n\nPouvez-vous créer un accès Pennylane Connect avec droits étendus aux clients pour le/la nouvel(le) IC suivant(e) :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = JIRA_PORTAL; linkLabel = "Ouvrir le portail Jira";
  }
  else if (action === "jira_chift") {
    title = "Ticket Jira — Chift";
    body = blockCopy("Titre", `Accès Chift — ${n.name}`)
      + blockCopy("Description", `Bonjour,\n\nPouvez-vous créer un accès Chift pour le/la nouvel(le) IC suivant(e) :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = JIRA_PORTAL; linkLabel = "Ouvrir le portail Jira";
  }
  else if (action === "jira_metabase") {
    title = "Ticket Jira — Metabase";
    body = blockCopy("Titre", `Accès Metabase — ${n.name}`)
      + blockCopy("Description", `Bonjour,\n\nPouvez-vous créer un accès Metabase pour le/la nouvel(le) IC suivant(e) :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = JIRA_PORTAL; linkLabel = "Ouvrir le portail Jira";
  }
  else if (action === "jira_tresorit") {
    title = "Ticket Jira — Trésorit";
    body = blockCopy("Titre", `Accès Trésorit — ${n.name}`)
      + blockCopy("Description", `Bonjour,\n\nPouvez-vous créer un accès Trésorit (dossier Equipe OB) pour le/la nouvel(le) IC suivant(e) :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = JIRA_PORTAL; linkLabel = "Ouvrir le portail Jira";
  }
  else if (action === "ops_chili") {
    title = "Ticket OPS — Lien Chili dans welcome mail";
    body = blockCopy("Message", `Bonjour,\n\nPouvez-vous vérifier / ajouter le lien Chili Piper dans le welcome mail SalesForce pour le/la nouvel(le) IC suivant(e) :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = OPS_NOTION; linkLabel = "Ouvrir le ticket OPS (Notion)";
  }
  else if (action === "ops_modjo") {
    title = "Ticket OPS — Team Onboarding Modjo";
    body = blockCopy("Message", `Bonjour,\n\nPouvez-vous ajouter le/la nouvel(le) IC suivant(e) à la team Onboarding dans Modjo :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = OPS_NOTION; linkLabel = "Ouvrir le ticket OPS (Notion)";
  }
  else if (action === "ops_intercom") {
    title = "Ticket OPS — Team Onboarding Intercom";
    body = blockCopy("Message", `Bonjour,\n\nPouvez-vous ajouter le/la nouvel(le) IC suivant(e) à la team Onboarding dans Intercom :\n\n${icInfoText(n)}\n\nMerci !`, true);
    link = OPS_NOTION; linkLabel = "Ouvrir le ticket OPS (Notion)";
  }
  else if (action === "swan") {
    title = "DM Slack à Vincent — Dash SWAN";
    body = blockCopy("Message", `Bonjour Vincent,\n\nPourrais-tu créer un accès au Dash SWAN pour ${n.name}${roleStr} qui vient de rejoindre l'équipe Professional Services ?\n\nMerci !`, true);
    link = SLACK_LINKS.vincent; linkLabel = "Ouvrir le DM de Vincent dans Slack";
  }
  else if (action === "braga") {
    title = "Message canal #relances-rdv-ob-braga";
    body = blockCopy("Message", `Bonjour,\n\nVoici le lien Chilipiper de ${n.name}${roleStr}, nouvel(le) IC qui vient de rejoindre l'équipe Onboarding Banker.\n\nMerci de l'ajouter à vos tâches de relances :\n${chiliLink(n.name)}`, true);
    link = SLACK_LINKS.braga; linkLabel = "Ouvrir #relances-rdv-ob-braga dans Slack";
  }

  body += `<a href="${link}" target="_blank" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;" onclick="markDoneFromModal('${id}','${getActionTaskKey(action)}')">${linkLabel}</a>`;
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = body;
  document.getElementById("modal").classList.add("open");
}

function getActionTaskKey(action) {
  const map = {slack:"slack_access", jira_connect:"pennylane_connect_jira", jira_chift:"chift_jira", jira_metabase:"metabase_access", jira_tresorit:"tresorit_check", swan:"dash_swan", braga:"braga_chili", ops_chili:"salesforce_chili", ops_modjo:"modjo_check", ops_intercom:"intercom_check"};
  return map[action] || "";
}
function markDoneFromModal(id, key) {
  if (key) setItemStatus(parseInt(id), key, "done");
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
  pendingRemoteRender = false; // le re-render ci-dessous prend en compte l'état à jour
  const hash = location.hash.replace(/^#\//, "").split("/");
  if (hash[0] === "newcomer") renderDetail(parseInt(hash[1]), curTabKey());
}
document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });

function copyEl(elId, btn) {
  const txt = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const o = btn.textContent; btn.textContent = "Copié !"; btn.style.background = "var(--green-dark)"; btn.style.color = "white";
    setTimeout(() => { btn.textContent = o; btn.style.background = ""; btn.style.color = ""; }, 1500);
  });
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
</script>
</body>
